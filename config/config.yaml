# Chess LLM Benchmark Configuration

stockfish:
  path: /usr/games/stockfish
  depth: 15  # Reduced from 22 for ~4x speedup
  threads: 1
  workers: 24  # Parallel Stockfish instances

lc0:
  binary: /home/rabrew/lc0-src/build/release/lc0
  weights: /home/rabrew/lc0-nets/network.pb
  onnx_model: /home/rabrew/lc0-nets/network.onnx

ollama:
  base_url: http://localhost:11434
  timeout: 600
  max_retries: 3

models:
  # Small (3-7B) - fast
  - llama3.2:3b
  - gemma3:4b
  - qwen2.5:7b
  - mistral:7b
  - wizardlm2:7b

  # Medium (8-14B)
  - llama3.1:8b
  - gemma3:12b
  - qwen2.5:14b
  - phi4:14b
  - solar:10.7b
  - gemma4:e4b  # gemma4 CoT makes it slow despite size — run after non-CoT mediums

  # Large (30B+) - slow but interesting
  - qwen2.5:32b
  - codellama:34b
  - yi:34b
  - command-r:35b
  - gemma4:26b
  - gemma4:31b
  - llama3.3:70b
  - gemma4:e2b
  - mixtral:8x7b
  - qwen2.5:72b

  # Reasoning models (slow - run last)
  - deepseek-r1:7b
  - deepseek-r1:14b

dataset:
  lichess_source: local  # "api" or "local"
  lichess_csv_path: data/lichess_puzzles.csv
  pgn_path: data/games.pgn

benchmark:
  max_positions_per_tier: 1000  # 1000 x 4 tiers = 4,000 total positions
  random_seed: 42
  prompt_formats:
    - fen_only
    - pgn+fen
    - cot
    - eval_only
    - move_only
    - explanation_only

evaluation:
  cpl_threshold: 50
  centipawn_eval_range:
    min: -2000
    max: 2000

workers:
  count: 8

correction_loop:
  enabled: true
  control_group: true
  max_attempts: 2

paths:
  data_dir: data
  jobs_db: jobs/db/jobs.db
  results_file: results/evaluations.jsonl
  logs_dir: results/logs
  plots_dir: results/plots
  metrics_dir: results/metrics
