<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess LLM Benchmark</title>
  <script src="/tailwind.min.js"></script>
  <script src="/chart.umd.min.js"></script>
  <style>
    .bar-fill { transition: width 0.4s ease; }
    .card { @apply bg-gray-900 rounded-xl p-5 shadow-lg; }
  </style>
</head>
<body class="min-h-screen p-6 font-mono text-sm">
  <div class="max-w-6xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold tracking-wide text-white">Chess LLM Benchmark</h1>
    <div class="flex items-center gap-4">
      <span id="last-updated" class="text-gray-500 text-xs"></span>
      <button onclick="loadMetrics()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs">↻ Refresh Metrics</button>
    </div>
  </div>

  <!-- Run Progress -->
  <section class="bg-gray-900 rounded-xl p-5 shadow-lg mb-6">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-semibold text-white">Run Progress</h2>
      <span id="overall-badge" class="text-xs text-gray-400"></span>
    </div>
    <!-- Pipeline bar -->
    <div class="mb-3">
      <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span>Pipeline <span class="text-gray-600">(tiers complete)</span></span>
        <span id="pipeline-label">—</span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-3">
        <div id="pipeline-bar" class="bar-fill bg-indigo-500 h-3 rounded-full" style="width:0%"></div>
      </div>
    </div>
    <!-- Current tier bar -->
    <div class="mb-4">
      <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span>Current tier <span class="text-gray-600">(jobs)</span></span>
        <span id="overall-label">—</span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-2">
        <div id="overall-bar" class="bar-fill bg-emerald-500 h-2 rounded-full" style="width:0%"></div>
      </div>
    </div>
  </section>

  <!-- Metrics grid -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

    <!-- Legal Move % -->
    <div class="bg-gray-900 rounded-xl p-5 shadow-lg">
      <h2 class="text-base font-semibold text-white mb-3">Legal Move %</h2>
      <div style="position:relative;height:220px"><canvas id="chart-legal"></canvas></div>
    </div>

    <!-- Hallucination Rate -->
    <div class="bg-gray-900 rounded-xl p-5 shadow-lg">
      <h2 class="text-base font-semibold text-white mb-3">Hallucination Rate</h2>
      <div style="position:relative;height:220px"><canvas id="chart-halluc"></canvas></div>
    </div>

    <!-- CPL -->
    <div class="bg-gray-900 rounded-xl p-5 shadow-lg">
      <h2 class="text-base font-semibold text-white mb-3">Centipawn Loss (CPL)</h2>
      <div style="position:relative;height:220px"><canvas id="chart-cpl"></canvas></div>
    </div>

    <!-- Eval Direction Accuracy -->
    <div class="bg-gray-900 rounded-xl p-5 shadow-lg">
      <h2 class="text-base font-semibold text-white mb-3">Eval Direction Accuracy</h2>
      <div style="position:relative;height:220px"><canvas id="chart-eval"></canvas></div>
    </div>

  </div>

  <!-- Explanation Score (full width) -->
  <div class="bg-gray-900 rounded-xl p-5 shadow-lg mb-6">
    <h2 class="text-base font-semibold text-white mb-3">Explanation Score (T3)</h2>
    <div style="position:relative;height:200px"><canvas id="chart-t3"></canvas></div>
  </div>

  <!-- MAE (full width) -->
  <div class="bg-gray-900 rounded-xl p-5 shadow-lg">
    <h2 class="text-base font-semibold text-white mb-1">Eval MAE <span class="text-gray-500 font-normal text-xs">(mean absolute error vs Stockfish, centipawns — lower is better)</span></h2>
    <div style="position:relative;height:220px"><canvas id="chart-mae"></canvas></div>
  </div>

  <script>
  // ── Palette ──────────────────────────────────────────────────────────────
  const DIFFICULTIES = ["easy", "medium", "hard", "extreme"];
  const DIFF_COLORS = {
    easy:    "rgba(52,211,153,0.85)",   // emerald
    medium:  "rgba(251,191,36,0.85)",   // amber
    hard:    "rgba(251,113,133,0.85)",  // rose
    extreme: "rgba(167,139,250,0.85)",  // violet
  };
  const MODEL_COLOR = "rgba(99,179,237,0.85)"; // sky

  const charts = {};

  function makeChart(id, type, data, options = {}) {
    const ctx = document.getElementById(id).getContext("2d");
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
      type,
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#9ca3af", font: { family: "monospace", size: 11 } } } },
        scales: {
          x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
          y: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.07)" } },
        },
        ...options,
      },
    });
  }

  // ── Progress ──────────────────────────────────────────────────────────────
  const TIER_COLORS = { easy: "bg-emerald-500", medium: "bg-amber-400", hard: "bg-rose-400", extreme: "bg-violet-400" };
  const TIER_LABELS = ["E", "M", "H", "X"];
  const TIERS = ["easy", "medium", "hard", "extreme"];

  async function loadProgress() {
    let data;
    try {
      const r = await fetch("/api/progress");
      data = await r.json();
    } catch { return; }

    // Pipeline bar
    const p = data.pipeline;
    document.getElementById("pipeline-label").textContent =
      `${p.done_tiers} / ${p.total_tiers} tiers (${p.pipeline_pct}%)`;
    document.getElementById("pipeline-bar").style.width = p.pipeline_pct + "%";

    // Current tier bar
    document.getElementById("overall-label").textContent =
      data.total ? `${data.done.toLocaleString()} / ${data.total.toLocaleString()} (${data.overall_pct}%)` : "idle";
    document.getElementById("overall-bar").style.width = (data.overall_pct || 0) + "%";
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString();

    // Per-model rows — show tier dots + active job bar
    const container = document.getElementById("model-progress");
    container.innerHTML = "";
    const activeModels = new Set((data.models || []).filter(m => m.running).map(m => m.model));

    for (const [model, size] of Object.entries(p.model_tiers ? Object.fromEntries(
      Object.keys(p.model_tiers).map(m => [m, p.model_tiers[m]])
    ) : {})) {
      const tiers = p.model_tiers[model];
      const allDone = TIERS.every(t => tiers[t].complete);
      const isRunning = activeModels.has(model);
      const activeJob = (data.models || []).find(m => m.model === model);

      // Tier dots
      const dots = TIERS.map((t, i) => {
        const complete = tiers[t].complete;
        const color = complete ? TIER_COLORS[t] : "bg-gray-700";
        const label = TIER_LABELS[i];
        return `<span class="inline-flex items-center justify-center w-5 h-5 rounded text-xs font-bold ${color} ${complete ? "text-gray-900" : "text-gray-600"}">${label}</span>`;
      }).join("");

      // Active progress bar (only shown when this model is running current tier)
      const activeBar = isRunning && activeJob ? `
        <div class="flex-1 bg-gray-800 rounded-full h-1.5">
          <div class="bar-fill bg-emerald-500 h-1.5 rounded-full" style="width:${activeJob.pct}%"></div>
        </div>
        <span class="text-emerald-400 text-xs">● ${activeJob.pct}%</span>
      ` : `<div class="flex-1"></div>`;

      const status = allDone
        ? `<span class="text-gray-500 text-xs">✓ done</span>`
        : isRunning
          ? ""
          : `<span class="text-gray-600 text-xs">queued</span>`;

      container.insertAdjacentHTML("beforeend", `
        <div class="flex items-center gap-2">
          <span class="text-gray-400 w-36 truncate text-xs">${model}</span>
          <span class="text-gray-600 w-8 text-right text-xs">${size}</span>
          <div class="flex gap-1">${dots}</div>
          ${activeBar}
          ${status}
        </div>
      `);
    }
  }

  // ── Metrics ───────────────────────────────────────────────────────────────
  async function loadMetrics() {
    let data;
    try {
      const r = await fetch("/api/metrics");
      data = await r.json();
    } catch { return; }

    const models = data.by_model.filter(r => r.t2_legal_mean !== null || r.t1_direction_correct_mean !== null);
    const labels = models.map(r => r.model.replace(/:(\w+)$/, "\n$1"));

    // Legal Move %
    makeChart("chart-legal", "bar", {
      labels,
      datasets: [{
        label: "Legal Move %",
        data: models.map(r => r.t2_legal_mean !== null ? +(r.t2_legal_mean * 100).toFixed(1) : null),
        backgroundColor: MODEL_COLOR,
        borderRadius: 4,
      }],
    }, {
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: "#9ca3af", callback: v => v + "%" },
          grid: { color: "rgba(255,255,255,0.07)" },
        },
        x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
      plugins: { legend: { display: false } },
    });

    // Hallucination Rate — grouped by difficulty
    const hallucModels = [...new Set(data.hallucination.map(r => r.model))];
    const hallucLabels = hallucModels.map(m => m.replace(/:(\w+)$/, "\n$1"));
    const hallucDatasets = DIFFICULTIES.map(diff => ({
      label: diff,
      data: hallucModels.map(m => {
        const row = data.hallucination.find(r => r.model === m && r.difficulty === diff);
        return row ? +(row.hallucination_rate * 100).toFixed(1) : null;
      }),
      backgroundColor: DIFF_COLORS[diff],
      borderRadius: 3,
    }));
    makeChart("chart-halluc", "bar", { labels: hallucLabels, datasets: hallucDatasets }, {
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: "#9ca3af", callback: v => v + "%" },
          grid: { color: "rgba(255,255,255,0.07)" },
        },
        x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
      plugins: { legend: { labels: { color: "#9ca3af", font: { family: "monospace", size: 11 } } } },
    });

    // CPL — grouped by difficulty
    const diffModels = [...new Set(data.by_difficulty.map(r => r.model))];
    const diffLabels = diffModels.map(m => m.replace(/:(\w+)$/, "\n$1"));
    const cplDatasets = DIFFICULTIES.map(diff => ({
      label: diff,
      data: diffModels.map(m => {
        const row = data.by_difficulty.find(r => r.model === m && r.difficulty === diff);
        return row?.t2_cpl !== null && row?.t2_cpl !== undefined ? +row.t2_cpl.toFixed(0) : null;
      }),
      backgroundColor: DIFF_COLORS[diff],
      borderRadius: 3,
    }));
    makeChart("chart-cpl", "bar", { labels: diffLabels, datasets: cplDatasets }, {
      plugins: { legend: { labels: { color: "#9ca3af", font: { family: "monospace", size: 11 } } } },
    });

    // Eval Direction Accuracy
    makeChart("chart-eval", "bar", {
      labels,
      datasets: [{
        label: "Direction Accuracy",
        data: models.map(r => r.t1_direction_correct_mean !== null ? +(r.t1_direction_correct_mean * 100).toFixed(1) : null),
        backgroundColor: "rgba(251,191,36,0.85)",
        borderRadius: 4,
      }],
    }, {
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: "#9ca3af", callback: v => v + "%" },
          grid: { color: "rgba(255,255,255,0.07)" },
        },
        x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
      plugins: { legend: { display: false } },
    });

    // MAE — grouped by difficulty
    const maeModels = [...new Set(data.by_difficulty.map(r => r.model))];
    const maeLabels = maeModels.map(m => m.replace(/:(\w+)$/, "\n$1"));
    const maeDatasets = DIFFICULTIES.map(diff => ({
      label: diff,
      data: maeModels.map(m => {
        const row = data.by_difficulty.find(r => r.model === m && r.difficulty === diff);
        return row?.t1_mae !== null && row?.t1_mae !== undefined ? +row.t1_mae.toFixed(0) : null;
      }),
      backgroundColor: DIFF_COLORS[diff],
      borderRadius: 3,
    }));
    makeChart("chart-mae", "bar", { labels: maeLabels, datasets: maeDatasets }, {
      plugins: { legend: { labels: { color: "#9ca3af", font: { family: "monospace", size: 11 } } } },
      scales: {
        y: {
          ticks: { color: "#9ca3af", callback: v => v + " cp" },
          grid: { color: "rgba(255,255,255,0.07)" },
        },
        x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
    });

    // Explanation Score
    makeChart("chart-t3", "bar", {
      labels,
      datasets: [{
        label: "Explanation Score",
        data: models.map(r => r.t3_score_mean !== null ? +(r.t3_score_mean * 100).toFixed(1) : null),
        backgroundColor: "rgba(167,139,250,0.85)",
        borderRadius: 4,
      }],
    }, {
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: "#9ca3af", callback: v => v + "%" },
          grid: { color: "rgba(255,255,255,0.07)" },
        },
        x: { ticks: { color: "#9ca3af", font: { family: "monospace", size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
      plugins: { legend: { display: false } },
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadProgress();
  loadMetrics();
  setInterval(loadProgress, 5000);
  </script>

  </div> <!-- max-w-6xl -->
</body>
</html>
